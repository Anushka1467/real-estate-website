<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="en"></html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Property</title>

    <link rel="stylesheet" th:href="@{/style.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<nav class="navbar">

    <a th:href="@{/}" class="logo">
       <i class="fa-solid fa-house"></i>
       RealEstate
    </a>

    <ul>

        <li><a th:href="@{/}">Home</a></li>
        <li><a th:href="@{/properties}">Properties</a></li>
        <li><a th:href="@{/properties/add}">Add Property</a></li>
        <li><a th:href="@{/logout}">Logout</a></li>

    </ul>

</nav>

<section class="form-section">

    <div class="form-container">

        <h1>Edit Property</h1>

        <form th:action="@{/properties/update}"
              th:object="${property}"
              method="post">

            <!-- Hidden ID -->

            <input type="hidden" th:field="*{id}">

            <div class="form-grid">

                <div class="form-group">
                    <label>Property Title</label>
                    <input type="text" th:field="*{title}" required>
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input type="number" th:field="*{price}" required>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" th:field="*{address}" required>
                </div>

                <div class="form-group">
                    <label>City</label>
                    <input type="text" th:field="*{city}" required>
                </div>

                <div class="form-group">
                    <label>State</label>
                    <input type="text" th:field="*{state}" required>
                </div>

                <div class="form-group">
                    <label>Property Type</label>

                    <select th:field="*{propertyType}">
                        <option value="Apartment">Apartment</option>
                        <option value="Villa">Villa</option>
                        <option value="House">House</option>
                        <option value="Plot">Plot</option>
                    </select>

                </div>

                <div class="form-group">
                    <label>Bedrooms</label>
                    <input type="number" th:field="*{bedrooms}" required>
                </div>

                <div class="form-group">
                    <label>Bathrooms</label>
                    <input type="number" th:field="*{bathrooms}" required>
                </div>

                <div class="form-group">
                    <label>Area (sq ft)</label>
                    <input type="number" step="0.1" th:field="*{area}" required>
                </div>

                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" th:field="*{imageUrl}">
                </div>

            </div>

            <div class="form-group full-width">

                <label>Description</label>

                <textarea rows="5"
                          th:field="*{description}"></textarea>

            </div>

            <button type="submit" class="btn save-btn">

                Update Property

            </button>

        </form>

    </div>

</section>

</body>

</html>
